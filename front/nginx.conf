server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA
    location / {
        try_files $uri /index.html;
    }

    # バックエンド(Rust/axum)へプロキシ
    location /api/ {
        proxy_pass http://back:8080;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }
}
